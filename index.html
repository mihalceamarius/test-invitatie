<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuntă — Invitație</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@300;400;500&family=Raleway:wght@200;300;400;500&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ivory:        #faf7f0;
  --ivory-2:      #f5f1e8;
  --cream:        #f5ede0;
  --warm:         #ede0cd;
  --gold:         #c9a96e;
  --gold-bright:  #e8c98a;
  --gold-deep:    #9b7a42;
  --gold-pale:    rgba(201,169,110,0.12);
  --deep:         #1a1208;
  --ink:          #2e2010;
  --muted:        #7a6b56;
  --blush:        #e8cfc0;
  --rose:         #d4a898;
  --border:       rgba(201,169,110,0.2);
  --border-s:     rgba(201,169,110,0.45);
  --shadow:       rgba(26,18,8,0.15);
}

html { scroll-behavior: smooth; overflow-x: hidden; }
body {
  font-family: 'Raleway', sans-serif;
  background: var(--ivory);
  color: var(--ink);
  font-weight: 300;
  overflow-x: hidden;
  cursor: none;
}

/* ─── CURSOR ─── */
#cur  { position:fixed;top:0;left:0;width:7px;height:7px;background:var(--gold);border-radius:50%;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);transition:width .25s,height .25s;mix-blend-mode:multiply; }
#cur-r{ position:fixed;top:0;left:0;width:30px;height:30px;border:1px solid rgba(201,169,110,.45);border-radius:50%;pointer-events:none;z-index:99998;transform:translate(-50%,-50%);transition:width .4s,height .4s,border-color .3s; }
#cur.h  { width:13px;height:13px; }
#cur-r.h{ width:46px;height:46px;border-color:var(--gold); }
@media(max-width:768px){#cur,#cur-r{display:none;}body{cursor:auto;}}

/* ─── GRAIN ─── */
.grain{position:fixed;inset:0;pointer-events:none;z-index:1;opacity:.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  animation:gr .35s steps(1) infinite;
}
@keyframes gr{0%{transform:translate(0,0)}25%{transform:translate(-4%,3%)}50%{transform:translate(3%,-2%)}75%{transform:translate(-2%,4%)}100%{transform:translate(1%,-1%)}}

/* ─── MOBILE MENU ─── */
.hamburger{
  display:none;position:fixed;top:14px;right:18px;z-index:1100;
  width:38px;height:38px;flex-direction:column;justify-content:center;align-items:center;gap:5px;
  cursor:pointer;background:rgba(250,247,240,.95);border:1px solid var(--border);padding:9px;
}
.hamburger span{display:block;width:18px;height:1px;background:var(--gold);transition:all .35s;}
.hamburger.open span:nth-child(1){transform:translateY(6px) rotate(45deg);}
.hamburger.open span:nth-child(2){opacity:0;transform:translateX(-6px);}
.hamburger.open span:nth-child(3){transform:translateY(-6px) rotate(-45deg);}
@media(max-width:768px){.hamburger{display:flex;}}

/* ─── NAV ─── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  display:flex;justify-content:center;align-items:center;
  height:58px;
  background:rgba(250,247,240,.97);
  backdrop-filter:blur(14px) saturate(180%);
  border-bottom:1px solid var(--border);
  transition:box-shadow .4s;
}
nav.scrolled{box-shadow:0 4px 40px rgba(26,18,8,.08);}
nav a{
  font-family:'Cinzel',serif;font-size:9px;letter-spacing:.22em;
  text-transform:uppercase;text-decoration:none;
  color:var(--muted);padding:0 1.3rem;height:58px;
  display:flex;align-items:center;
  position:relative;transition:color .3s;cursor:none;
}
nav a::after{
  content:'';position:absolute;bottom:0;left:50%;right:50%;
  height:1.5px;background:var(--gold);
  transition:left .4s,right .4s;
}
nav a:hover,nav a.active{color:var(--gold-deep);}
nav a:hover::after,nav a.active::after{left:.9rem;right:.9rem;}

/* Mobile nav drawer */
.nav-drawer{
  position:fixed;top:0;right:0;bottom:0;width:240px;
  background:var(--deep);z-index:1050;
  transform:translateX(110%);transition:transform .45s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;justify-content:center;align-items:flex-start;
  padding:3rem 2.5rem;gap:0;
  border-left:1px solid rgba(201,169,110,.15);
}
.nav-drawer.open{transform:translateX(0);}
.nav-drawer a{
  font-family:'Cinzel',serif;font-size:10px;letter-spacing:.28em;
  text-transform:uppercase;text-decoration:none;
  color:rgba(250,247,240,.45);padding:.9rem 0;
  transition:color .3s;cursor:pointer;
  border-bottom:1px solid rgba(201,169,110,.08);width:100%;
}
.nav-drawer a:hover{color:var(--gold);}
.nav-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1040;
  opacity:0;pointer-events:none;transition:opacity .4s;
}
.nav-overlay.open{opacity:1;pointer-events:auto;}

/* ─── REVEAL ─── */
.reveal{opacity:0;transform:translateY(28px);
  transition:opacity .9s cubic-bezier(.2,.8,.2,1),transform .9s cubic-bezier(.2,.8,.2,1);}
.reveal.visible{opacity:1;transform:translateY(0);}
.reveal.d1{transition-delay:.1s;}.reveal.d2{transition-delay:.2s;}
.reveal.d3{transition-delay:.3s;}.reveal.d4{transition-delay:.45s;}

/* ─── SECTION HELPERS ─── */
.s-label{font-family:'Cinzel',serif;font-size:8.5px;letter-spacing:.38em;text-transform:uppercase;color:var(--gold);text-align:center;margin-bottom:.8rem;display:block;}
.s-title{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,4vw,2.75rem);font-weight:300;text-align:center;color:var(--ink);line-height:1.15;margin-bottom:.7rem;}
.s-title em{font-style:italic;color:var(--gold-deep);}
.s-rule{display:flex;align-items:center;justify-content:center;gap:1rem;margin-bottom:4rem;}
.s-rule::before,.s-rule::after{content:'';display:block;height:1px;width:65px;background:var(--border);}
.gem{width:6px;height:6px;background:var(--gold);transform:rotate(45deg);}

/* ─── PASSWORD ─── */
.pw-overlay{position:fixed;inset:0;background:var(--deep);display:flex;align-items:center;justify-content:center;z-index:99997;}
.pw-box{text-align:center;max-width:360px;width:100%;padding:3.5rem 2.75rem;border:1px solid var(--border-s);position:relative;}
.pw-box::before{content:'';position:absolute;inset:8px;border:1px solid rgba(201,169,110,.1);pointer-events:none;}
.pw-box h2{font-family:'Playfair Display',serif;font-size:2.1rem;font-weight:300;font-style:italic;color:var(--ivory);margin-bottom:.4rem;}
.pw-box p{color:rgba(250,247,240,.4);font-size:.82rem;letter-spacing:.05em;margin-bottom:2rem;}
.pw-orn{color:var(--gold);font-size:.9rem;letter-spacing:.45em;margin-bottom:1.5rem;display:block;opacity:.5;}
.pw-box input{width:100%;padding:.85rem 1rem;background:rgba(201,169,110,.05);border:1px solid rgba(201,169,110,.18);font-family:'Raleway',sans-serif;font-size:.95rem;color:var(--ivory);outline:none;text-align:center;letter-spacing:.18em;margin-bottom:1.1rem;transition:border-color .3s;}
.pw-box input::placeholder{color:rgba(201,169,110,.25);}
.pw-box input:focus{border-color:var(--gold);}
.pw-box button{width:100%;padding:.85rem;background:transparent;border:1px solid var(--gold);color:var(--gold);font-family:'Cinzel',serif;font-size:9px;letter-spacing:.28em;text-transform:uppercase;cursor:pointer;transition:all .35s;}
.pw-box button:hover{background:var(--gold);color:var(--deep);}

/* ─── HERO ─── */
#hero{
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:7rem 2rem 6rem;
  position:relative;overflow:hidden;
}
.hero-bg{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 90% 70% at 50% -5%, rgba(201,169,110,.08) 0%, transparent 60%),
    radial-gradient(ellipse 55% 55% at 12% 92%, rgba(212,168,152,.13) 0%, transparent 55%),
    radial-gradient(ellipse 55% 55% at 88% 88%, rgba(212,168,152,.1) 0%, transparent 55%);
}
/* Parallax layers */
.hero-parallax{position:absolute;inset:0;pointer-events:none;}
.parallax-layer{position:absolute;}
.p-l1{top:15%;left:8%;font-family:'Cormorant Garamond',serif;font-size:5rem;font-style:italic;color:rgba(201,169,110,.06);font-weight:300;user-select:none;}
.p-l2{top:20%;right:10%;font-family:'Cormorant Garamond',serif;font-size:4.5rem;font-style:italic;color:rgba(201,169,110,.05);font-weight:300;user-select:none;}
.p-l3{bottom:20%;left:5%;font-family:'Cormorant Garamond',serif;font-size:3.5rem;font-style:italic;color:rgba(201,169,110,.04);font-weight:300;user-select:none;}

/* Petals */
.petal-canvas{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.petal{position:absolute;top:-20px;opacity:0;animation:petalFall linear infinite;will-change:transform;}
@keyframes petalFall{0%{opacity:0;transform:translateY(-20px) rotate(0deg) scale(.8) translateX(0)}10%{opacity:.55}50%{transform:translateY(55vh) rotate(360deg) scale(1) translateX(30px)}90%{opacity:.25}100%{opacity:0;transform:translateY(108vh) rotate(720deg) scale(1.1) translateX(-20px)}}

.hero-eyebrow{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.42em;text-transform:uppercase;color:var(--gold);margin-bottom:2.2rem;animation:fadeUp 1.2s ease both;}
.hero-names{font-family:'Playfair Display',serif;font-weight:300;line-height:.93;color:var(--ink);animation:fadeUp 1.2s .15s ease both;}
.hero-name-bride{display:block;font-size:clamp(2.6rem,6.5vw,5.2rem);font-style:italic;}
.hero-amp-wrap{display:flex;align-items:center;justify-content:center;gap:1.8rem;margin:.75rem 0;animation:fadeUp 1.2s .25s ease both;}
.hero-amp-line{flex:1;max-width:130px;height:1px;background:linear-gradient(90deg,transparent,var(--gold));}
.hero-amp-line.r{background:linear-gradient(90deg,var(--gold),transparent);}
.hero-amp{font-family:'Cormorant Garamond',serif;font-size:clamp(1.9rem,4.2vw,3.1rem);font-style:italic;font-weight:300;color:var(--gold);}
.hero-name-groom{display:block;font-size:clamp(2.6rem,6.5vw,5.2rem);font-style:italic;}

.hero-date-loc{margin-top:2.2rem;animation:fadeUp 1.2s .4s ease both;}
.hero-date-text{font-family:'Cormorant Garamond',serif;font-size:clamp(1.1rem,2.5vw,1.5rem);font-style:italic;color:var(--muted);letter-spacing:.06em;}

/* Countdown */
.countdown{display:flex;gap:2.2rem;justify-content:center;margin-top:2.5rem;animation:fadeUp 1.2s .55s ease both;}
.cd-item{display:flex;flex-direction:column;align-items:center;gap:.3rem;}
.cd-num{font-family:'Playfair Display',serif;font-size:clamp(1.9rem,4.5vw,2.8rem);font-weight:300;color:var(--ink);line-height:1;}
.cd-label{font-family:'Cinzel',serif;font-size:7px;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);}
.cd-sep{font-family:'Cormorant Garamond',serif;font-size:1.8rem;color:rgba(201,169,110,.28);align-self:flex-start;margin-top:.4rem;}

/* Save the date btn */
.save-date-btn{
  margin-top:3rem;
  animation:fadeUp 1.2s .7s ease both;
  display:inline-flex;align-items:center;gap:.7rem;
  padding:.75rem 2rem;
  border:1px solid var(--border-s);
  font-family:'Cinzel',serif;font-size:8.5px;letter-spacing:.28em;text-transform:uppercase;
  color:var(--gold-deep);text-decoration:none;
  transition:all .35s;cursor:pointer;background:transparent;
  position:relative;overflow:hidden;
}
.save-date-btn::before{content:'';position:absolute;inset:0;background:var(--gold);transform:translateX(-100%);transition:transform .4s cubic-bezier(.4,0,.2,1);z-index:0;}
.save-date-btn:hover::before{transform:translateX(0);}
.save-date-btn span{position:relative;z-index:1;transition:color .4s;}
.save-date-btn:hover span{color:var(--deep);}

/* Scroll cue */
.scroll-cue{
  position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:.5rem;
  animation:fadeUp 1.2s .9s ease both;
  pointer-events:none;
}
.scroll-cue-txt{font-family:'Cinzel',serif;font-size:7px;letter-spacing:.32em;color:var(--gold);text-transform:uppercase;}
.scroll-line{width:1px;height:48px;background:linear-gradient(to bottom,var(--gold),transparent);animation:scrollPulse 2.2s ease infinite;}
@keyframes scrollPulse{0%,100%{opacity:.25;transform:scaleY(.5)}50%{opacity:.9;transform:scaleY(1)}}

@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}

/* ─── STORY ─── */
#story{padding:6rem 2rem;max-width:900px;margin:0 auto;}
.story-layout{display:grid;grid-template-columns:5fr 7fr;gap:3rem;align-items:start;}
.story-image-wrap{position:relative;}
.story-image-wrap::before{content:'';position:absolute;top:-18px;left:-18px;width:100%;height:100%;border:1px solid var(--border);z-index:0;}
.story-image-wrap::after{content:'';position:absolute;bottom:-10px;right:-10px;width:55%;height:55%;background:linear-gradient(135deg,rgba(201,169,110,.07),transparent);border:1px solid var(--border);z-index:0;}
.story-img-box{width:100%;aspect-ratio:3/4;background:linear-gradient(160deg,var(--warm) 0%,var(--blush) 100%);position:relative;z-index:1;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.95rem;color:var(--muted);}
.story-text{padding-top:.5rem;}
.story-text p{font-size:1rem;line-height:1.8;color:var(--muted);margin-bottom:1rem;font-weight:300;text-align:justify;}
.story-text p:first-of-type::first-letter{font-family:'Playfair Display',serif;font-size:3.5rem;font-weight:300;font-style:italic;float:left;line-height:.72;margin:.08em .12em 0 0;color:var(--gold);}
.story-quote{border-left:2px solid var(--gold);padding:1rem 1.25rem;margin:1.25rem 0;font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-style:italic;font-weight:300;color:var(--gold-deep);line-height:1.5;}

/* ─── GALLERY ─── */
#gallery{background:var(--ink);padding:8rem 2rem;position:relative;overflow:hidden;}
#gallery::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 50% 50%,rgba(201,169,110,.04) 0%,transparent 70%);pointer-events:none;}
.gallery-inner{max-width:1020px;margin:0 auto;}
#gallery .s-label{color:var(--gold);}
#gallery .s-title{color:var(--ink);}
#gallery .s-rule::before,#gallery .s-rule::after{background:rgba(201,169,110,.25);}

.gallery-grid{
  display:grid;
  grid-template-columns:repeat(12,1fr);
  grid-template-rows:230px 230px;
  gap:10px;
}
.gallery-cell{overflow:hidden;position:relative;background:var(--ivory);border:1px solid rgba(201,169,110,.15);color:var(--muted);display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:12px;text-transform:uppercase;letter-spacing:.1em;}
.gallery-cell:nth-child(1){grid-column:1/6;grid-row:1/3;}
.gallery-cell:nth-child(2){grid-column:6/9;grid-row:1/2;}
.gallery-cell:nth-child(3){grid-column:9/13;grid-row:1/2;}
.gallery-cell:nth-child(4){grid-column:6/10;grid-row:2/3;}
.gallery-cell:nth-child(5){grid-column:10/13;grid-row:2/3;}

.gallery-ph{
  width:100%;height:100%;
  background:linear-gradient(145deg,var(--cream),var(--ivory));
  display:flex;align-items:center;justify-content:center;
  font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--muted);
  font-size:.88rem;letter-spacing:.1em;cursor:pointer;
  position:relative;overflow:hidden;
  transition:background .45s,color .45s;
}
.gallery-ph::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(201,169,110,.05) 0%,transparent 60%);
  opacity:0;transition:opacity .45s;
}
/* shimmer */
.gallery-ph::before{
  content:'';position:absolute;top:0;left:-100%;
  width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(201,169,110,.08),transparent);
  transform:skewX(-20deg);
  transition:left .7s cubic-bezier(.4,0,.2,1);
}
.gallery-cell:hover .gallery-ph{background:linear-gradient(145deg,var(--cream),var(--blush));}
.gallery-cell:hover .gallery-ph::after{opacity:1;}
.gallery-cell:hover .gallery-ph::before{left:160%;}
.gallery-cell:hover .gallery-ph{color:var(--gold-deep);}

/* ─── SCHEDULE ─── */
#schedule{padding:8rem 2rem;max-width:820px;margin:0 auto;}
.timeline{position:relative;padding-top:.5rem;}
.timeline::before{content:'';position:absolute;left:50%;top:0;bottom:0;width:1px;background:linear-gradient(to bottom,transparent,var(--border) 8%,var(--border) 92%,transparent);transform:translateX(-50%);}
.tl-item{display:grid;grid-template-columns:1fr 56px 1fr;margin-bottom:3.25rem;align-items:start;}
/* odd: content left */
.tl-item:nth-child(odd) .tl-left{text-align:right;padding-right:2.25rem;padding-top:2px;padding-left:0;}
.tl-item:nth-child(odd) .tl-right{padding-left:2.25rem;padding-top:2px;padding-right:0;}
/* even: content right (swap) */
.tl-item:nth-child(even) .tl-left{text-align:left;padding-left:2.25rem;padding-right:0;padding-top:2px;order:3;}
.tl-item:nth-child(even) .tl-center{order:2;}
.tl-item:nth-child(even) .tl-right{text-align:right;padding-right:2.25rem;padding-left:0;padding-top:2px;order:1;}
.tl-center{display:flex;flex-direction:column;align-items:center;gap:4px;}
.tl-dot-o{width:26px;height:26px;border-radius:50%;border:1px solid var(--border-s);display:flex;align-items:center;justify-content:center;background:var(--ivory);transition:border-color .3s,transform .3s;flex-shrink:0;}
.tl-item:hover .tl-dot-o{border-color:var(--gold);transform:scale(1.12);}
.tl-dot-i{width:6px;height:6px;border-radius:50%;background:var(--gold);transition:transform .3s;}
.tl-item:hover .tl-dot-i{transform:scale(1.35);}
.tl-time{font-family:'Cinzel',serif;font-size:9.5px;letter-spacing:.2em;color:var(--gold);margin-bottom:.28rem;}
.tl-event{font-family:'Playfair Display',serif;font-size:1.18rem;font-weight:400;color:var(--ink);margin-bottom:.35rem;line-height:1.2;}
.tl-desc{font-size:.82rem;line-height:1.7;color:var(--muted);font-weight:300;}
/* empty side */
.tl-left:empty,.tl-right:empty{pointer-events:none;}

/* ─── PARTY ─── */
#gallery{background:var(--cream);padding:8rem 2rem;position:relative;}
#gallery::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--border) 30%,var(--border) 70%,transparent);}
#gallery::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--border) 30%,var(--border) 70%,transparent);}
#party{background:var(--cream);padding:8rem 2rem;position:relative;}
#party::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--border) 30%,var(--border) 70%,transparent);}
#party::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--border) 30%,var(--border) 70%,transparent);}
#rsvp{background:var(--cream);padding:8rem 2rem;position:relative;}
#rsvp::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--border) 30%,var(--border) 70%,transparent);}
#rsvp::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--border) 30%,var(--border) 70%,transparent);}
.party-inner{max-width:920px;margin:0 auto;}
.party-group-title{font-family:'Cormorant Garamond',serif;font-size:1.75rem;font-style:italic;font-weight:300;color:var(--gold-deep);text-align:center;margin-bottom:2.25rem;letter-spacing:.05em;}
.party-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:2rem;margin-bottom:3.75rem;}
.party-card{display:flex;flex-direction:column;align-items:center;gap:.7rem;width:128px;}
.party-avatar{
  width:78px;height:78px;border-radius:50%;
  background:linear-gradient(145deg,var(--warm),var(--blush));
  border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;font-size:1.45rem;font-style:italic;color:var(--gold-deep);
  transition:transform .35s,border-color .35s,box-shadow .35s;
  position:relative;overflow:hidden;
}
.party-avatar::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 35% 35%,rgba(255,255,255,.28),transparent 65%);border-radius:50%;}

function notify(msg, type='info', dur=5000){
  const box = document.getElementById('notifBox');
  const el = document.createElement('div');
  el.className = `notif ${type}`;
  el.innerHTML = `<span>${msg}</span><span class="notif-close" onclick="this.parentElement.remove()">×</span>`;
  box.appendChild(el);
  if(dur>0) setTimeout(()=>{el.style.opacity='0';el.style.transition='opacity .3s';setTimeout(()=>el.remove(),300);},dur);
}

function checkPw(){
  const v = document.getElementById('pwInput').value;
  if(!v){notify('Vă rog introduceți parola!','error',3000);return;}
  try{
    if(btoa(v)===C.password){
      const m=document.getElementById('pwModal');
      m.style.opacity='0';m.style.transition='opacity .65s';
      setTimeout(()=>m.style.display='none',650);
      sessionStorage.setItem('unlocked','1');
      notify('Bun venit! 🤍','success',2500);
    } else {
      document.getElementById('pwInput').value='';
      notify('Parola incorectă. Încercați din nou.','error',3000);
    }
  }catch(e){notify('Eroare. Încercați din nou.','error',3000);}
}

/* ══════════════════════════════════════════
   PARALLAX
══════════════════════════════════════════ */
window.addEventListener('scroll',()=>{
  const y=window.scrollY;
  document.querySelectorAll('.parallax-layer[data-speed]').forEach(el=>{
    el.style.transform=`translateY(${y*parseFloat(el.dataset.speed)}px)`;
  });
  document.getElementById('mainNav').classList.toggle('scrolled',y>60);
});

/* ══════════════════════════════════════════
   PETALS
══════════════════════════════════════════ */
(function(){
  const canvas=document.getElementById('petalCanvas');
  const syms=['✿','❀','✾','❁'];
  function spawn(){
    const p=document.createElement('div');
    p.className='petal';
    p.textContent=syms[Math.floor(Math.random()*syms.length)];
    p.style.left=Math.random()*100+'vw';
    p.style.color=`rgba(201,169,110,${.12+Math.random()*.28})`;
    p.style.fontSize=(20+Math.random()*14)+'px';
    const dur=14+Math.random()*18;
    p.style.animationDuration=dur+'s';
    p.style.animationDelay=Math.random()*2+'s';
    canvas.appendChild(p);
    setTimeout(()=>p.remove(),(dur+10)*1000);
  }
  for(let i=0;i<14;i++) spawn();
  setInterval(spawn,1600);
})();

/* ══════════════════════════════════════════
   COUNTDOWN
══════════════════════════════════════════ */
function startCountdown(){
  const el=document.getElementById('countdown');
  const target=C.hero.weddingDate?new Date(C.hero.weddingDate):null;
  if(!target||isNaN(target)){el.style.display='none';return;}
  function tick(){
    const diff=target-new Date();
    if(diff<=0){el.innerHTML=`<div class="cd-item"><div class="cd-num" style="font-size:1.4rem;font-style:italic">Astăzi este ziua cea mare!</div></div>`;return;}
    const d=Math.floor(diff/86400000),h=Math.floor(diff%86400000/3600000),m=Math.floor(diff%3600000/60000),s=Math.floor(diff%60000/1000);
    el.innerHTML=`
      <div class="cd-item"><div class="cd-num">${d}</div><div class="cd-label">Zile</div></div>
      <span class="cd-sep">:</span>
      <div class="cd-item"><div class="cd-num">${String(h).padStart(2,'0')}</div><div class="cd-label">Ore</div></div>
      <span class="cd-sep">:</span>
      <div class="cd-item"><div class="cd-num">${String(m).padStart(2,'0')}</div><div class="cd-label">Minute</div></div>
      <span class="cd-sep">:</span>
      <div class="cd-item"><div class="cd-num">${String(s).padStart(2,'0')}</div><div class="cd-label">Secunde</div></div>`;
  }
  tick(); setInterval(tick,1000);
}

/* ══════════════════════════════════════════
   SCROLL REVEAL
══════════════════════════════════════════ */
const ro=new IntersectionObserver(entries=>{
  entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');ro.unobserve(e.target);}});
},{threshold:.01,rootMargin:'0px 0px -16px 0px'});

/* ══════════════════════════════════════════
   ACTIVE NAV
══════════════════════════════════════════ */
function setupActiveNav(){
  const secs=document.querySelectorAll('#story,#gallery,#schedule,#party,#venue,#rsvp');
  const links=document.querySelectorAll('nav a');
  const obs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        links.forEach(l=>l.classList.remove('active'));
        const l=document.querySelector(`nav a[href="#${e.target.id}"]`);
        if(l)l.classList.add('active');
      }
    });
  },{threshold:.2});
  secs.forEach(s=>obs.observe(s));
}

/* ══════════════════════════════════════════
   RSVP SUBMIT
══════════════════════════════════════════ */
async function handleRSVP(){
  const btn=document.getElementById('rsvpBtn');
  const txt=document.getElementById('rsvpBtnTxt');
  const data={
    first_name:document.getElementById('fFirst').value.trim(),
    last_name:document.getElementById('fLast').value.trim(),
    attending:document.getElementById('fAtt').value,
    num_guests:parseInt(document.getElementById('fGuests').value),
    message:document.getElementById('fMsg').value.trim(),
    created_at:new Date().toISOString()
  };
  if(!data.first_name||!data.last_name||!data.attending){notify('Vă rog să completați toate câmpurile obligatorii!','error',4000);return;}
  btn.disabled=true;btn.style.opacity='.55';
  const orig=txt.textContent; txt.textContent='Se trimite…';
  try{
    const res=await fetch(`${C.supabaseUrl}/rest/v1/rsvps`,{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':C.supabaseKey,'Authorization':`Bearer ${C.supabaseKey}`,'Prefer':'return=minimal'},
      body:JSON.stringify(data)
    });
    if(res.ok||res.status===201){
      txt.textContent=C.rsvp.btnDone;
      btn.style.background='var(--gold)';btn.style.cursor='default';
      btn.querySelector('.btn-txt').style.color='var(--deep)';
      ['fFirst','fLast','fMsg'].forEach(id=>document.getElementById(id).value='');
      document.getElementById('fAtt').value='';document.getElementById('fGuests').value='1';
      notify('✓ Mulțumim! Confirmarea a fost trimisă cu succes!','success',6000);
    } else {
      let msg=`HTTP ${res.status}`;
      try{const j=await res.json();msg=j.message||j.error||msg;}catch(e){}
      notify(`Eroare: ${msg}`,'error',0);
      txt.textContent=orig;btn.disabled=false;btn.style.opacity='1';
    }
  }catch(err){
    notify(`Eroare de conexiune: ${err.message}`,'error',0);
    txt.textContent=orig;btn.disabled=false;btn.style.opacity='1';
  }
}
